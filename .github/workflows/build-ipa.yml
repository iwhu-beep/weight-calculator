name: Build iOS IPA

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Add iOS platform
        run: npx cap add ios
        continue-on-error: true

      - name: Sync iOS project
        run: npx cap sync ios

      - name: List iOS project structure
        run: find ios -maxdepth 3 -type f | head -50

      - name: Build IPA (unsigned)
        run: |
          # Find the xcodeproj path
          XCODEPROJ=$(find ios -name "*.xcodeproj" -maxdepth 3 | head -1)
          echo "Found Xcode project: $XCODEPROJ"
          
          PROJECT_DIR=$(dirname "$XCODEPROJ")
          SCHEME=$(xcodebuild -list -project "$XCODEPROJ" 2>/dev/null | grep -A1 "Schemes:" | tail -1 | xargs)
          echo "Using scheme: $SCHEME"

          # Build archive
          xcodebuild \
            -project "$XCODEPROJ" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO

          # Create IPA from archive
          mkdir -p build/ipa/Payload
          cp -r build/App.xcarchive/Products/Applications/*.app build/ipa/Payload/
          cd build/ipa
          zip -r ../App.ipa Payload/
          cd ../..

          # Move IPA to project root
          cp build/App.ipa ./App.ipa
          echo "IPA size: $(du -h App.ipa | cut -f1)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: App.ipa
          path: App.ipa
          retention-days: 30
