name: Build iOS IPA

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.3.0)'
        required: false
        default: '1.3.0'
      release:
        description: '是否发布到 Releases'
        required: true
        type: boolean
        default: false

jobs:
  build-ipa:
    runs-on: macos-15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Add iOS platform
        run: npx cap add ios
        continue-on-error: true

      - name: Sync iOS project
        run: npx cap sync ios

      - name: Build IPA (unsigned)
        run: |
          XCODEPROJ=$(find ios -name "*.xcodeproj" -maxdepth 3 | head -1)
          echo "Found Xcode project: $XCODEPROJ"
          SCHEME=$(xcodebuild -list -project "$XCODEPROJ" 2>/dev/null | grep -A1 "Schemes:" | tail -1 | xargs)
          echo "Using scheme: $SCHEME"

          xcodebuild \
            -project "$XCODEPROJ" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO

          mkdir -p build/ipa/Payload
          cp -r build/App.xcarchive/Products/Applications/*.app build/ipa/Payload/
          cd build/ipa
          zip -r ../App.ipa Payload/
          cd ../..
          cp build/App.ipa ./App.ipa
          echo "IPA size: $(du -h App.ipa | cut -f1)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: App.ipa
          path: App.ipa
          retention-days: 90

      - name: Create GitHub Release
        if: github.event.inputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: 称重色粉计算器 v${{ github.event.inputs.version }}
          body: |
            ## 称重色粉计算器 v${{ github.event.inputs.version }}
            
            点击下方 App.ipa 下载 iOS 安装包
            
            **安装方式：**
            1. 下载 App.ipa 文件
            2. 使用 Apple Configurator 2 或爱思助手安装到 iPhone
            3. 或在 Xcode 中通过 Devices 窗口安装
            
            **注意：** 此为未签名 IPA，需 Apple 开发者账号签名后才能安装到真机
          files: App.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
